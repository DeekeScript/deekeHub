version: "3.8"
services:
  redis:
    container_name: redis
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:redis-alpine
    ports:
      - "6379:6379"
    volumes:
      - ../redis/redis.conf:/usr/local/redis/redis.conf:ro
      - ../redis/data:/data
    environment:
      - TZ=Asia/Shanghai
    command: 
      redis-server /usr/local/redis/redis.conf --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - frontend

  mysql:
    container_name: mysql
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:deeke-mysql-8.1
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: deeke-hub-2016
    volumes:
      - ../mysql/data:/var/lib/mysql
      - ../mysql/mysql-files:/var/lib/mysql-files
      - ../mysql/conf.d:/etc/mysql/conf.d
      - ../mysql/my.cnf:/etc/mysql/my.cnf:ro
    networks:
      - backend

  php:
    container_name: php
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:deeke-php-8.3.11-fpm-alpine-swoole
    #如果是x86_64使用下面的镜像
    #image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:deeke-php-8.3.11-fpm-alpine-swoole-linux
    ports:
      - "9000:9000"
      - "9502:9502"
    volumes:
      - ../php/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
      - ../php/conf.d:/usr/local/etc/php-fpm/php-fpm.d
      - ../nginx/html:/var/www/html
      - ../php/php.ini:/usr/local/etc/php/php.ini
    environment:
      - TZ=Asia/Shanghai # 设置时区
    networks:
      - frontend
      - backend
    links:
      - redis
      - mysql
      # - nsqd

  nginx:
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:deeke-nginx-1.27-alpine
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ../nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf/conf.d:/etc/nginx/conf.d
      - ../nginx/html:/usr/share/nginx/html
      - ../nginx/cert:/etc/nginx/cert
    networks:
      - frontend
    links:
      - php

  supervisor:
    container_name: supervisor
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:deeke-supervisor
    volumes:
      - ../supervisor/conf.d:/etc/supervisor/conf.d
      - ../supervisor/log:/home/deekeHubLog
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    command: supervisord -c /etc/supervisor/supervisord.conf
    networks:
      - backend

  livekit:
    container_name: livekit
    image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:liveKitServer
    #如果是x86_64使用下面的镜像
    #image: registry.cn-hangzhou.aliyuncs.com/jiangqiao/deeke:liveKitServer-amd64
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "7882:7882"
    volumes:
      - ../docker/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:

volumes:
  db-data:
