    <rect x="0" y="0" width="26" height="48" rx="4" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
    <rect x="2" y="5" width="22" height="34" rx="1.5" fill="rgba(59,130,246,0.03)"/>
    <circle cx="13" cy="44" r="2" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="0.5"/>
  </g>
  <!-- Phone 2 - top-right, slight right tilt -->
